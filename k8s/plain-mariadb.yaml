apiVersion: v1
kind: Pod
metadata:
  name: plain-mariadb
  namespace: default
  labels:
    app: plain-mariadb
spec:
  restartPolicy: Always
  containers:
    - name: mariadb
      image: mariadb:11.8
      ports:
        - containerPort: 3306
          name: mysql
      env:
        - name: MARIADB_ROOT_PASSWORD
          value: change-me-root-password
        - name: MARIADB_DATABASE
          value: appdb
        - name: MARIADB_USER
          value: appuser
        - name: MARIADB_PASSWORD
          value: change-me-app-password
      volumeMounts:
        - name: mariadb-data
          mountPath: /var/lib/mysql
      readinessProbe:
        tcpSocket:
          port: 3306
        initialDelaySeconds: 20
        periodSeconds: 5
      livenessProbe:
        tcpSocket:
          port: 3306
        initialDelaySeconds: 30
        periodSeconds: 10
  volumes:
    - name: mariadb-data
      emptyDir: {}
