apiVersion: v1
kind: Namespace
metadata:
  name: modelarmor-lab
  annotations:
    kubearmor-visibility: process,file,network,capabilities
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modelarmor-demo
  namespace: modelarmor-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: modelarmor-demo
  template:
    metadata:
      labels:
        app: modelarmor-demo
    spec:
      containers:
        - name: python
          image: python:3.11-slim
          command: ["/bin/sh", "-c", "sleep 365d"]
