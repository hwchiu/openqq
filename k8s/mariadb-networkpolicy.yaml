apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mariadb-sandbox-ingress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: mariadb-sandbox
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshell
          podSelector:
            matchLabels:
              app.kubernetes.io/name: openshell
              app.kubernetes.io/instance: openshell
      ports:
        - protocol: TCP
          port: 3306
