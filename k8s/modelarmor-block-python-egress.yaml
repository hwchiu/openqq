apiVersion: security.kubearmor.com/v1
kind: KubeArmorPolicy
metadata:
  name: modelarmor-block-python-egress
  namespace: modelarmor-lab
spec:
  selector:
    matchLabels:
      app: modelarmor-demo
  network:
    matchProtocols:
      - protocol: TCP
        fromSource:
          - path: /usr/local/bin/python3.11
  action: Block
