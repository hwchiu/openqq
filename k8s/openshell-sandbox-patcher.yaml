apiVersion: v1
kind: ServiceAccount
metadata:
  name: openshell-sandbox-patcher
  namespace: openshell
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openshell-sandbox-patcher
  namespace: openshell
rules:
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openshell-sandbox-patcher
  namespace: openshell
subjects:
  - kind: ServiceAccount
    name: openshell-sandbox-patcher
    namespace: openshell
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openshell-sandbox-patcher
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openshell-sandbox-patcher
  namespace: openshell
data:
  reconcile.sh: |
    #!/bin/sh
    set -eu

    namespace="${NAMESPACE:-openshell}"
    selector="${SELECTOR:-openshell.ai/managed-by=openshell}"
    interval="${INTERVAL_SECONDS:-5}"
    patch='[{"op":"add","path":"/spec/podTemplate/spec/containers/0/securityContext/privileged","value":true}]'

    while true; do
      sandboxes="$(kubectl -n "${namespace}" get sandbox -l "${selector}" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null || true)"

      for name in ${sandboxes}; do
        desired="$(kubectl -n "${namespace}" get sandbox "${name}" -o jsonpath='{.spec.podTemplate.spec.containers[0].securityContext.privileged}' 2>/dev/null || true)"
        if [ "${desired}" != "true" ]; then
          kubectl -n "${namespace}" patch sandbox "${name}" --type json -p="${patch}" >/dev/null
        fi

        pod_privileged="$(kubectl -n "${namespace}" get pod "${name}" -o jsonpath='{.spec.containers[0].securityContext.privileged}' 2>/dev/null || true)"
        if [ "${pod_privileged}" != "true" ]; then
          kubectl -n "${namespace}" delete pod "${name}" --ignore-not-found --wait=false >/dev/null || true
        fi
      done

      sleep "${interval}"
    done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openshell-sandbox-patcher
  namespace: openshell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openshell-sandbox-patcher
  template:
    metadata:
      labels:
        app: openshell-sandbox-patcher
    spec:
      serviceAccountName: openshell-sandbox-patcher
      containers:
        - name: patcher
          image: bitnami/kubectl:latest
          command: ["/bin/sh", "/work/reconcile.sh"]
          env:
            - name: NAMESPACE
              value: openshell
            - name: SELECTOR
              value: openshell.ai/managed-by=openshell
            - name: INTERVAL_SECONDS
              value: "5"
          volumeMounts:
            - name: script
              mountPath: /work
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: openshell-sandbox-patcher
            defaultMode: 0755
