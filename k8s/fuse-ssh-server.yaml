apiVersion: v1
kind: Namespace
metadata:
  name: fuse-lab
---
apiVersion: v1
kind: Secret
metadata:
  name: sshfs-lab-auth
  namespace: fuse-lab
type: Opaque
stringData:
  password: change-me-please
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sshfs-server
  namespace: fuse-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sshfs-server
  template:
    metadata:
      labels:
        app: sshfs-server
    spec:
      containers:
        - name: sshd
          image: lscr.io/linuxserver/openssh-server:latest
          env:
            - name: PASSWORD_ACCESS
              value: "true"
            - name: USER_NAME
              value: fuseuser
            - name: USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sshfs-lab-auth
                  key: password
            - name: SUDO_ACCESS
              value: "false"
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          ports:
            - containerPort: 2222
              name: ssh
          volumeMounts:
            - name: export
              mountPath: /data/export
      volumes:
        - name: export
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sshfs-server
  namespace: fuse-lab
spec:
  selector:
    app: sshfs-server
  ports:
    - name: ssh
      port: 2222
      targetPort: ssh
