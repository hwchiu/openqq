apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  annotations:
    agents.x-k8s.io/pod-name: fuse-sshfs-proof
  creationTimestamp: "2026-06-05T13:56:45Z"
  generation: 2
  labels:
    openshell.ai/managed-by: openshell
    openshell.ai/sandbox-id: 3250e85c-10ca-4c61-b9ce-0378991f0ea0
  name: fuse-sshfs-proof
  namespace: openshell
  resourceVersion: "3580"
  uid: f2cd2283-fae2-4015-b4f0-288c07a0244a
spec:
  podTemplate:
    metadata:
      annotations:
        openshell.io/sandbox-id: 3250e85c-10ca-4c61-b9ce-0378991f0ea0
    spec:
      automountServiceAccountToken: false
      containers:
      - command:
        - /opt/openshell/bin/openshell-sandbox
        env:
        - name: OPENSHELL_SANDBOX_ID
          value: 3250e85c-10ca-4c61-b9ce-0378991f0ea0
        - name: OPENSHELL_SANDBOX
          value: fuse-sshfs-proof
        - name: OPENSHELL_ENDPOINT
          value: http://openshell.openshell.svc.cluster.local:8080
        - name: OPENSHELL_SANDBOX_COMMAND
          value: sleep infinity
        - name: OPENSHELL_SSH_SOCKET_PATH
          value: /run/openshell/ssh.sock
        - name: OPENSHELL_K8S_SA_TOKEN_FILE
          value: /var/run/secrets/openshell/token
        image: openshell-fuse-sshfs:local-amd64
        name: agent
        securityContext:
          capabilities:
            add:
            - SYS_ADMIN
            - NET_ADMIN
            - SYS_PTRACE
            - SYSLOG
          privileged: true
          runAsUser: 0
        volumeMounts:
        - mountPath: /var/run/secrets/openshell
          name: openshell-sa-token
          readOnly: true
        - mountPath: /opt/openshell/bin
          name: openshell-supervisor-bin
          readOnly: true
        - mountPath: /sandbox
          name: workspace
      initContainers:
      - command:
        - sh
        - -c
        - if [ ! -f /workspace-pvc/.workspace-initialized ]; then if [ -d /sandbox
          ]; then tar -C /sandbox -cf - . | tar -C /workspace-pvc -xpf -; fi && touch
          /workspace-pvc/.workspace-initialized; fi
        image: openshell-fuse-sshfs:local-amd64
        name: workspace-init
        securityContext:
          runAsUser: 0
        volumeMounts:
        - mountPath: /workspace-pvc
          name: workspace
      serviceAccountName: openshell-sandbox
      volumes:
      - name: openshell-sa-token
        projected:
          defaultMode: 256
          sources:
          - serviceAccountToken:
              audience: openshell-gateway
              expirationSeconds: 3600
              path: token
      - image:
          reference: ghcr.io/nvidia/openshell/supervisor:0.0.53
        name: openshell-supervisor-bin
  replicas: 1
  shutdownPolicy: Retain
  volumeClaimTemplates:
  - metadata:
      name: workspace
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 2Gi
